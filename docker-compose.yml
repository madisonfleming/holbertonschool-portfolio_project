services:
  frontend:
    build:
      context: .
      dockerfile: react-app/Dockerfile
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network
  
  backend:
    build:
      context: ..
      dockerfile: holbertonschool-portfolio_project/app/Dockerfile
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      DB_HOST: mysql
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    container_name: my_little_bookworm_mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: my_little_bookworm
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
