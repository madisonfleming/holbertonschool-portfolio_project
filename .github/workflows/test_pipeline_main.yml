name: MLB Main Test Pipeline
run-name: ${{ github.actor }} is testing MLB 🚀
on:
    pull_request:
        branches: ["main"]
jobs:
  Run-Unit-Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: echo "🖥️ The workflow is now ready to test your code on the runner."
      - name: Run domain tests
        run: |
          echo "Running Child tests..."
          python3 -m unittest tests/domain_tests/test_child_model.py
          echo "Running User tests..."
          python3 -m unittest tests/domain_tests/test_user_model.py
          echo "Running Milestone Type tests..."
          python3 -m unittest tests/domain_tests/test_milestone_type_model.py
          echo "Running Milestone Completion tests..."
          python3 -m unittest tests/domain_tests/test_milestone_completion_model.py
